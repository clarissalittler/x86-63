name: Deploy web app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Add the Rust WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Install the matching wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install web dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Run WebAssembly protocol tests
        run: npm run wasm:test

      - name: Build the browser app
        run: npm --workspace @x86-63/web run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
